name: Hourly Ingestion & Daily Retraining Automation

on:
  schedule:
    - cron: '0 * * * *'  # Automatically executes data ingestion every single hour
    - cron: '0 0 * * *'  # Automatically triggers the model retraining query daily at midnight
  workflow_dispatch:     # Enables manual execution via the GitHub Repository Actions UI panel

jobs:
  run-mlops-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Env
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Provision Required Core Dependencies
      run: pip install -r requirements.txt

    - name: Secure Authentication to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Execute Data Ingestion Pipeline
      if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 * * * *')
      run: python src/data_ingestion.py

    - name: Execute Model Retraining & Performance Evaluation
      if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *')
      run: python src/explainability.py